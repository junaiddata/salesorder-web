{% load humanize %}

<div class="qcal-calendar-grid">

{% for day in month_days %}

<div class="qcal-calendar-day
{% if day.date == today %}qcal-calendar-day-today{% endif %}
{% if not day.has_quotations %}qcal-calendar-day-empty{% endif %}">

    <div class="qcal-calendar-day-label">
        {{ day.formatted_date }}
    </div>

    <div class="qcal-calendar-day-value">
        {{ day.total_value|floatformat:0|intcomma }}
    </div>

    <div style="font-size:11px;font-weight:600;color:#059669;">
        GP: {{ day.gp|floatformat:0|intcomma }}
    </div>

    <div class="qcal-calendar-day-count">
        {{ day.quotation_count }}
        quotation{{ day.quotation_count|pluralize }}
    </div>

</div>

{% endfor %}

</div>
